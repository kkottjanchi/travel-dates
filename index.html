<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행 날짜 맞추기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:18px}
body{font-family:"Noto Sans KR",sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;-webkit-text-size-adjust:100%}
.hero{text-align:center;padding:60px 20px 30px}
.hero .sub{color:#888;font-size:.7rem;letter-spacing:4px;margin-bottom:8px}
.hero h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#e2b0ff,#9ecbff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.hero p{color:#aaa;font-size:.9rem;line-height:1.6}
.hero .badge{display:inline-block;margin-top:12px;padding:6px 16px;background:#667eea30;color:#9ecbff;border-radius:20px;font-size:.75rem;font-weight:700}
.container{max-width:540px;margin:0 auto;padding:0 16px 40px}
.section{margin-bottom:30px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-num{font-size:.7rem;color:#667eea;font-weight:900;letter-spacing:2px}
.section-title{font-size:1.1rem;font-weight:700;color:#c9a0ff}
.field-desc{font-size:.75rem;color:#666;margin-bottom:10px}
.name-input{width:100%;padding:16px;background:#1a1a2e;border:2px solid #2a2a4a;border-radius:12px;color:#fff;font-size:1rem;font-family:inherit;outline:none;transition:border .2s}
.name-input:focus{border-color:#667eea}
.month-block{background:#1a1a2e;border-radius:16px;padding:16px;margin-bottom:16px}
.month-label{font-size:1rem;font-weight:700;color:#c9a0ff;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #2a2a4a}
.date-grid{display:flex;flex-direction:column;gap:2px}
.date-item{display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:10px;cursor:pointer;transition:background .15s}
.date-item:active{background:#2a2a4a}
.date-item input[type=checkbox]{width:24px;height:24px;accent-color:#ff4757;cursor:pointer;flex-shrink:0}
.date-item .dt{font-size:.95rem;font-weight:500;flex:1}
.tag{font-size:.65rem;padding:3px 8px;border-radius:6px;font-weight:700}
.tag-weekend{background:#ff6b6b25;color:#ff6b6b}
.tag-holiday{background:#ffd93d25;color:#ffd93d}
.submit-btn{width:100%;padding:18px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:14px;color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:10px}
.submit-btn:active{transform:scale(.98)}
.submit-btn:disabled{opacity:.4;cursor:default}
.done-msg{text-align:center;padding:30px;background:#1a1a2e;border-radius:16px;margin-top:20px}
.done-msg h2{color:#00b894;font-size:1.3rem;margin-bottom:8px}
.done-msg p{color:#888;font-size:.85rem;line-height:1.5}
.done-msg a{color:#9ecbff;text-decoration:underline}
.footer{text-align:center;padding:20px;color:#333;font-size:.7rem}
.hidden{display:none}
</style>
</head>
<body>

<div class="hero">
  <div class="sub">TRAVEL 2026</div>
  <h1>여행 날짜 맞추기</h1>
  <p>안 되는 날만 체크하면 끝!<br>체크 안 한 날 = 가능한 날</p>
  <div class="badge">4월 ~ 5월</div>
</div>

<div class="container">
  <form id="mainForm" action="https://docs.google.com/forms/d/e/1FAIpQLSd_placeholder/formResponse" method="POST" target="hidden_iframe">

    <div class="section">
      <div class="section-header">
        <span class="section-num">01</span>
        <span class="section-title">이름</span>
      </div>
      <div class="field-desc">누가 답했는지 알아야 하니까요.</div>
      <input type="text" class="name-input" name="entry.1076725878" id="nameInput" placeholder="실명" required maxlength="10">
    </div>

    <div class="section" id="calendarSection">
      <div class="section-header">
        <span class="section-num">02</span>
        <span class="section-title">4월 — 안 되는 날 체크</span>
      </div>
      <div class="field-desc">안 되는 날만 체크! 체크 안 하면 가능한 날로 간주.</div>
      <div class="month-block" id="aprGrid"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-num">03</span>
        <span class="section-title">5월 — 안 되는 날 체크</span>
      </div>
      <div class="month-block" id="mayGrid"></div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">제출하기</button>
  </form>

  <div class="done-msg hidden" id="doneMsg">
    <h2>제출 완료!</h2>
    <p>응답이 저장됐습니다.<br>일정 바뀌면 다시 들어와서 제출하면 됩니다.</p>
    <p style="margin-top:12px"><a href="javascript:location.reload()">다시 하기</a></p>
  </div>
</div>

<iframe name="hidden_iframe" style="display:none"></iframe>

<div class="footer">TRAVEL DATE PICKER · 2026</div>

<script>
var FORM_ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLSd_placeholder/formResponse';
var DOW = ['일','월','화','수','목','금','토'];

// Google Form의 실제 formResponse URL 가져오기
(function(){
  var formId = '1_GG92YNWtgeuTmJOZE7H0Utwmu4TkV-kB5nZKPfO1wY';
  var action = 'https://docs.google.com/forms/d/' + formId + '/formResponse';
  document.getElementById('mainForm').action = action;
})();

// 4월 날짜 생성
(function(){
  var grid = document.getElementById('aprGrid');
  var holidays = {};
  for (var d = 1; d <= 30; d++) {
    var dt = new Date(2026, 3, d);
    var dow = dt.getDay();
    var label = '4/' + d + ' (' + DOW[dow] + ')';
    var fullLabel = label;
    if (dow === 0 || dow === 6) fullLabel += ' [주말]';
    var item = document.createElement('label');
    item.className = 'date-item';
    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.name = 'entry.500483830';
    cb.value = fullLabel;
    item.appendChild(cb);
    var span = document.createElement('span');
    span.className = 'dt';
    span.textContent = label;
    item.appendChild(span);
    if (dow === 0 || dow === 6) {
      var tag = document.createElement('span');
      tag.className = 'tag tag-weekend';
      tag.textContent = '주말';
      item.appendChild(tag);
    }
    grid.appendChild(item);
  }
})();

// 5월 날짜 생성
(function(){
  var grid = document.getElementById('mayGrid');
  var holidays = {5:'어린이날',6:'대체휴일'};
  for (var d = 1; d <= 31; d++) {
    var dt = new Date(2026, 4, d);
    var dow = dt.getDay();
    var label = '5/' + d + ' (' + DOW[dow] + ')';
    var fullLabel = label;
    if (holidays[d]) fullLabel = '5/' + d + ' (' + DOW[dow] + ') [' + holidays[d] + ']';
    else if (dow === 0 || dow === 6) fullLabel += ' [주말]';
    var item = document.createElement('label');
    item.className = 'date-item';
    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.name = 'entry.807108509';
    cb.value = fullLabel;
    item.appendChild(cb);
    var span = document.createElement('span');
    span.className = 'dt';
    span.textContent = label;
    item.appendChild(span);
    if (holidays[d]) {
      var tag = document.createElement('span');
      tag.className = 'tag tag-holiday';
      tag.textContent = holidays[d];
      item.appendChild(tag);
    } else if (dow === 0 || dow === 6) {
      var tag = document.createElement('span');
      tag.className = 'tag tag-weekend';
      tag.textContent = '주말';
      item.appendChild(tag);
    }
    grid.appendChild(item);
  }
})();

// 제출 처리
document.getElementById('mainForm').addEventListener('submit', function() {
  var name = document.getElementById('nameInput').value.trim();
  if (!name) return false;
  setTimeout(function() {
    document.getElementById('mainForm').style.display = 'none';
    document.getElementById('doneMsg').classList.remove('hidden');
  }, 500);
});
</script>
</body>
</html>
